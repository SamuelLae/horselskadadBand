<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Hörselskadad - Kontakta oss</title>
    </head>
    <body>
        <header>
            <nav class="navigate">
                <a href="index.html"><h3>Hem</h3></a>
            </nav>

            <a href="#top"><img src="horselskadadLogo.png" alt="Horselskadad Logo" class="logo"></a>

            <nav class="links">
                <a href="https://open.spotify.com/artist/6plVVPEEYEJXOUu6vl9Bxy" target="_blank"><h3>Spotify</h3></a>
                <a href="https://www.instagram.com/horselskadad.band/" target="_blank"><h3>Instagram</h3></a>
            </nav>

            <button class="hamburger" id="hamburger" aria-label="Meny">
                <span></span><span></span><span></span>
            </button>
        </header>

        <nav class="mobile-menu" id="mobileMenu">
            <a href="index.html"><h3>Hem</h3></a>
            <a href="https://open.spotify.com/artist/6plVVPEEYEJXOUu6vl9Bxy" target="_blank"><h3>Spotify</h3></a>
            <a href="https://www.instagram.com/horselskadad.band/" target="_blank"><h3>Instagram</h3></a>
        </nav>

        <div class="contactContainer">
            <form action="" class="contactLeft">
                <div class="contactLeftTitle">
                    <h1>Kontakta oss</h1>
                    <hr>
                </div>
                <input type="text" name="name" placeholder="Ditt namn" class="contactInputs" required>
                <input type="text" name="email" placeholder="Din email" class="contactInputs" required>
                <textarea name="message" placeholder="Ditt meddelande" class="contactInputs" required></textarea>
                <button type="submit" class="contactButton">Skicka</button>
            </form>


            <img src="kontaktBild.png" alt="ContactUsImage" class="contactRight">
        </div>

    </body>
    <script src="script.js"></script>
</html>
