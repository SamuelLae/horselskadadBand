<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="icon" 
     type="image/png" 
     href="horselskadadLogo.png">
    </head>
    <body>
        <header>
            <nav class="navigate">
                <a href="index.html"><h3>Hem</h3></a>
            </nav>

            <a href="#top"><img src="horselskadadLogo.png" alt="Horselskadad Logo" class="logo"></a>

            <nav class="links">
                <a href="https://open.spotify.com/artist/6plVVPEEYEJXOUu6vl9Bxy" target="_blank"><img src="SpotifyLogo.png" alt="Spotify" class="social-icon"></a>
                <a href="https://www.instagram.com/horselskadad.band/" target="_blank"><img src="instagramLogo-removebg-preview.png" alt="Instagram" class="social-icon"></a>
                <a href="https://www.tiktok.com/@horselskadad.band?_r=1&_t=ZN-94v751V4NgU" target="_blank"><img src="tiktokLogo.png" alt="TikTok" class="social-icon"></a>
                <a href="https://youtube.com/@horselskadadband?si=D_Okt24bGaCXY3yG" target="_blank"><img src="youtubeLogo.png" alt="YouTube" class="social-icon"></a>
            </nav>

            <button class="hamburger" id="hamburger" aria-label="Meny">
                <span></span><span></span><span></span>
            </button>
        </header>

        <nav class="mobile-menu" id="mobileMenu">
            <a href="index.html"><h3>Hem</h3></a>
            <a href="https://open.spotify.com/artist/6plVVPEEYEJXOUu6vl9Bxy" target="_blank"><h3>Spotify</h3></a>
            <a href="https://www.instagram.com/horselskadad.band/" target="_blank"><h3>Instagram</h3></a>
            <a href="https://www.tiktok.com/@horselskadad.band?_r=1&_t=ZN-94v751V4NgU" target="_blank"><h3>TikTok</h3></a>
            <a href="https://youtube.com/@horselskadadband?si=D_Okt24bGaCXY3yG" target="_blank"><h3>YouTube</h3></a>
        </nav>

        <div class="contactContainer">
            <form action="https://api.web3forms.com/submit" method="POST" class="contactLeft">
                <div class="contactLeftTitle">
                    <h1>Kontakta oss</h1>
                    <hr>
                </div>
                <input type="hidden" name="access_key" value="02da8242-f7c7-4c52-9ceb-09d25bbe6708">
                <input type="text" name="name" placeholder="Ditt namn" class="contactInputs" required>
                <input type="text" name="email" placeholder="Din email" class="contactInputs" required>
                <textarea name="message" placeholder="Ditt meddelande" class="contactInputs" required></textarea>
                <button type="submit" class="contactButton">Skicka</button>
            </form>


            <img src="kontaktBild.png" alt="ContactUsImage" class="contactRight">
        </div>

    </body>
    <script src="script.js"></script>
</html>
